<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeri Gambar | Portofolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar" aria-label="Navigasi utama">
        <a class="logo" href="index.html">NAH</a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="dokumentasi.html">Dokumentasi Projek</a></li>
          <li><a href="library.html">Library Game</a></li>
          <li><a class="active" href="galeri.html">Galeri Gambar</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="section gallery">
        <div class="container center">
          <h1 class="section-title">Galeri Gambar</h1>
          <p class="description">
            Kumpulan gambar favorit dari game dan hobi menggambar.
          </p>
          <div class="gallery-grid">
            <figure class="gallery-item">
              <img
                src="game/arlechino.jpg"
                alt="Karakter RPG gaya anime"
                loading="lazy"
                decoding="async"
              />
            </figure>
            <figure class="gallery-item">
              <img
                src="game/yelen.jpg"
                alt="Karakter RPG bergaya futuristik"
                loading="lazy"
                decoding="async"
              />
            </figure>
            <figure class="gallery-item">
              <img
                src="gamabar/monster.jpg"
                alt="Sketsa monster"
                loading="lazy"
                decoding="async"
              />
            </figure>
            <figure class="gallery-item">
              <img
                src="gamabar/couple.jpg"
                alt="Sketsa karakter"
                loading="lazy"
                decoding="async"
              />
            </figure>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
